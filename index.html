<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=Libre+Baskerville&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: "Libre Baskerville", serif;
    color: #333;
    overflow-x: hidden;

    /* SMALL FLORAL BACKGROUND */
    background:
        linear-gradient(rgba(255,255,255,0.96), rgba(255,255,255,0.96)),
        url('https://www.transparenttextures.com/patterns/flowers.png');
    background-repeat: repeat;
    background-size: 300px;
}

/* COVER */
.cover {
    position: fixed;
    inset: 0;
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    z-index: 20;
    transition: opacity 1.8s ease;
}

.cover img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.cover-text {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    color: #fff;
    font-size: 14px;
    background: rgba(0,0,0,0.4);
    padding: 10px 20px;
    border-radius: 25px;
}

.cover.fade-out {
    opacity: 0;
    pointer-events: none;
}

/* CONTAINER */
.container {
    position: relative;
    max-width: 600px;
    margin: auto;
    padding: 50px 20px;
    text-align: center;
    animation: slowFade 3s ease;
}

@keyframes slowFade {
    from { opacity: 0; }
    to { opacity: 1; }
}

/* NAMES */
.names {
    font-family: "Playfair Display", serif;
    font-size: 32px;
    color: #c2a15f;
    margin: 25px 0;
}

/* DIVIDER */
.divider {
    width: 60px;
    height: 2px;
    background: #c2a15f;
    margin: 25px auto;
}

/* HEADINGS */
h2 {
    font-family: "Playfair Display", serif;
    color: #c2a15f;
    font-weight: 500;
    margin-top: 35px;
}

/* TEXT */
p {
    font-size: 15px;
    line-height: 1.8;
    margin: 12px 0;
}

/* SLIDE ANIMATION (SLOW) */
.fade-line {
    opacity: 0;
    transform: translateY(25px);
    transition: all 2s ease;
}

.fade-line.show {
    opacity: 1;
    transform: translateY(0);
}

/* NAME FROM LEFT */
.slide-left {
    opacity: 0;
    transform: translateX(-120px);
    transition: all 2.2s ease;
}

.slide-left.show {
    opacity: 1;
    transform: translateX(0);
}

/* NAME FROM RIGHT */
.slide-right {
    opacity: 0;
    transform: translateX(120px);
    transition: all 2.2s ease;
}

.slide-right.show {
    opacity: 1;
    transform: translateX(0);
}

/* MOBILE */
@media (max-width: 600px) {
    .names { font-size: 26px; }
    p { font-size: 14px; }
}
</style>
</head>

<body>

<!-- COVER -->
<div class="cover" id="cover">
    <img src="Custom Card.jpg">
    <div class="cover-text">Tap to Open Invitation</div>
</div>

<!-- CONTENT -->
<div class="container">

    <p class="fade-line">With the blessings of our parents</p>
    <div class="divider fade-line"></div>

    <!-- NAME LEFT & RIGHT -->
    <div class="names slide-left">Crisean</div>
    <div class="names slide-right">&amp;</div>
    <div class="names slide-left">Dinithi</div>

    <p class="fade-line">Joyfully invite you</p>
    <p class="fade-line">to celebrate the sacrament of our marriage</p>

    <div class="divider fade-line"></div>

    <h2 class="fade-line">Our Story</h2>
    <p class="fade-line">
        In a world of countless souls,<br>
        God chose us,<br>
        and in that choice, our story began.
    </p>

    <div class="divider fade-line"></div>

    <h2 class="fade-line">Wedding Day</h2>
    <p class="fade-line">
        Saturday, 16th May 2026<br>
        at 9.30 in the morning
    </p>

</div>

<script>
const cover = document.getElementById('cover');

cover.addEventListener('click', () => {
    cover.classList.add('fade-out');

    setTimeout(() => {
        cover.style.display = "none";
        startAnimations();
    }, 1800);
});

/* SLOW ANIMATION SEQUENCE */
function startAnimations() {
    const elements = document.querySelectorAll('.fade-line, .slide-left, .slide-right');
    elements.forEach((el, index) => {
        setTimeout(() => {
            el.classList.add('show');
        }, index * 600); // slower timing
    });
}
</script>

</body>
</html>
